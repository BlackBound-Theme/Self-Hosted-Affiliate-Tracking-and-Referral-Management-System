<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiliate Login — AffiliateTracker Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #f0f0f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; -webkit-font-smoothing: antialiased; }
        .login-shell { position: relative; width: 100%; max-width: 420px; padding: 20px; }
        .login-shell::before { content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(ellipse at 30% 20%, rgba(59, 130, 246, 0.06) 0%, transparent 50%), radial-gradient(ellipse at 70% 80%, rgba(139, 92, 246, 0.04) 0%, transparent 50%); z-index: -1; }
        .login-card { background: #15151f; border: 1px solid #2a2a3a; border-radius: 16px; padding: 40px 36px; box-shadow: 0 0 40px rgba(59, 130, 246, 0.04); }
        .login-brand { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 32px; }
        .login-brand__icon { width: 44px; height: 44px; border-radius: 10px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; color: #fff; }
        .login-brand__text { font-size: 22px; font-weight: 700; }
        .login-title { text-align: center; font-size: 16px; color: #9595a8; margin-bottom: 28px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 13px; font-weight: 500; color: #9595a8; margin-bottom: 6px; }
        .form-input { width: 100%; padding: 12px 14px; background: #0a0a0f; border: 1px solid #2a2a3a; border-radius: 8px; color: #f0f0f5; font-size: 14px; font-family: inherit; outline: none; transition: border-color 150ms ease; }
        .form-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        .form-check { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #9595a8; margin-bottom: 24px; }
        .form-check input { accent-color: #3b82f6; }
        .btn-login { width: 100%; padding: 13px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 150ms ease; box-shadow: 0 2px 12px rgba(59, 130, 246, 0.3); }
        .btn-login:hover { background: #2563eb; box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4); transform: translateY(-1px); }
        .demo-note { margin-top: 20px; text-align: center; font-size: 12px; color: #55556a; }
        .demo-note a { color: #3b82f6; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-shell">
        <div class="login-card">
            <div class="login-brand">
                <img src="assets/img/logo.png" alt="Logo" style="height: 48px; width: 48px; border-radius: 8px;">
                <span class="login-brand__text">AffiliateTracker</span>
            </div>
            <p class="login-title">Sign in to your affiliate portal</p>
            <form onsubmit="window.location.href='affiliate-dashboard.html';return false;">
                <div class="form-group">
                    <label class="form-label" for="demoAffEmail">Email Address</label>
                    <input type="email" id="demoAffEmail" class="form-input" value="jane@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label" for="demoAffPass">Password</label>
                    <input type="password" id="demoAffPass" class="form-input" value="••••••••">
                </div>
                <label class="form-check"><input type="checkbox" checked> Remember me</label>
                <button type="submit" class="btn-login">Sign In</button>
            </form>
            <p class="demo-note">This is a static demo. <a href="admin-login.html">Admin login →</a></p>
        </div>
    </div>
</body>
</html>
