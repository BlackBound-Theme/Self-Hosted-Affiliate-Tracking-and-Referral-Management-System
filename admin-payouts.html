<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payouts — AffiliateTracker Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="admin-shell">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <aside class="sidebar" id="adminSidebar">
            <a href="index.html" class="sidebar__brand"><img src="assets/img/logo.png" alt="Logo" style="height: 32px; width: 32px; border-radius: 5px;">Admin Panel</a>
            <nav class="sidebar__nav">
                <div class="sidebar__section-label">Overview</div>
                <a href="admin-dashboard.html" class="sidebar__link">
                    <svg class="sidebar__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    Dashboard</a>
                <div class="sidebar__section-label">Management</div>
                <a href="admin-affiliates.html" class="sidebar__link">
                    <svg class="sidebar__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    Affiliates</a>
                <a href="admin-payouts.html" class="sidebar__link sidebar__link--active">
                    <svg class="sidebar__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                    Payouts</a>
            </nav>
            <div class="sidebar__footer"><a href="admin-login.html" class="btn btn--secondary" style="width:100%;">Logout</a></div>
        </aside>

        <div class="admin-main">
            <header class="admin-topbar">
                <div class="admin-topbar__left">
                    <button class="admin-topbar__hamburger" id="sidebarToggle">☰</button>
                    <span class="admin-topbar__breadcrumb">Payouts</span>
                </div>
                <div class="admin-topbar__actions"><span style="font-size:13px;color:var(--text-secondary);">Super Admin</span></div>
            </header>

            <div class="admin-content">
                <div class="page-header"><h1 class="page-header__title">Payout Management</h1><p class="page-header__subtitle">Review, approve, and process affiliate payout requests.</p></div>

                <div class="stat-grid animate-in">
                    <div class="stat-card"><div class="stat-card__label">Pending</div><div class="stat-card__value" style="color:var(--accent-amber);">$9,200.00</div></div>
                    <div class="stat-card"><div class="stat-card__label">Processing</div><div class="stat-card__value" style="color:var(--accent-purple);">$2,500.00</div></div>
                    <div class="stat-card"><div class="stat-card__label">Completed</div><div class="stat-card__value" style="color:var(--accent-green);">$62,300.00</div></div>
                </div>

                <div class="panel animate-in">
                    <div class="panel__header"><h2 class="panel__title">Payout Queue</h2>
                        <select class="form-input form-select" style="max-width:160px;"><option>All Status</option><option>Pending</option><option>Processing</option><option>Completed</option><option>Failed</option></select>
                    </div>
                    <table class="data-table">
                        <thead><tr><th>Affiliate</th><th>Amount</th><th>Method</th><th>Status</th><th>Confirmed</th><th>Reference</th><th>Date</th><th>Actions</th></tr></thead>
                        <tbody id="payoutTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/demo.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var toggle = document.getElementById('sidebarToggle');
            var sidebar = document.getElementById('adminSidebar');
            var overlay = document.getElementById('sidebarOverlay');
            if (toggle) { toggle.addEventListener('click', function () { sidebar.classList.toggle('sidebar--open'); overlay.classList.toggle('active'); }); overlay.addEventListener('click', function () { sidebar.classList.remove('sidebar--open'); overlay.classList.remove('active'); }); }
            DemoApp.populatePayoutTable('payoutTableBody');
        });
    </script>
</body>
</html>
